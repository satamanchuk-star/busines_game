# Конфиг nginx для ibsgame.ru
# Скопировать в: /etc/nginx/sites-available/ibsgame.ru
# Потом: ln -s /etc/nginx/sites-available/ibsgame.ru /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name ibsgame.ru www.ibsgame.ru;

    # После получения SSL — certbot заменит этот блок автоматически
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Критично для WebSocket:
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
