<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>IBS · FMCG-цепочка · Проектор</title>
<link rel="stylesheet" href="/fonts/onest.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f3f5f9;--panel:#ffffff;--panel2:#f7f9fc;--line:#e6eaf1;--line2:#eef1f6;
  --ink:#0d1526;--ink2:#56627a;--ink3:#9aa6b8;
  --ibs:#2563eb;--ibs-soft:#eef3ff;--ibs-line:#d7e3ff;
  --ret:#2563eb;--sup:#15a34a;--dist:#d97706;--pu:#7c3aed;
  --good:#15a34a;--warn:#d97706;--bad:#dc2626;
  /* legacy aliases — JS template strings reference these */
  --P:#2563eb;--PD:#1d4ed8;--PU:#7c3aed;
  --OK:#15a34a;--WN:#d97706;--BD:#dc2626;
  --W:#0d1526;--W2:#56627a;--W3:#9aa6b8;
  --bg2:#ffffff;--bg3:#e6eaf1;
  --r:10px;--sh:0 2px 8px rgba(13,21,38,.08);
}
body{font-family:'Onest',sans-serif;background:var(--bg);color:var(--ink);
  min-height:100vh;display:flex;flex-direction:column}

/* ── Header ── */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;
  background:var(--panel);border-bottom:1.5px solid var(--line);
  box-shadow:0 1px 4px rgba(13,21,38,.05);flex-shrink:0}
.hdr h1{font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.2px}
.ibs-logo{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;
  background:#1d3461;border-radius:5px;flex-shrink:0}
.ibs-logo span{font-family:'Arial Black',Arial,sans-serif;font-size:11px;font-weight:900;
  color:#fff;letter-spacing:-.5px}
.hdr-l{display:flex;align-items:center;gap:10px}
.hdr-c{display:flex;align-items:center;gap:12px}
.round-badge{background:var(--ibs-soft);color:var(--ibs);border:1px solid var(--ibs-line);
  border-radius:20px;padding:4px 13px;font-size:12px;font-weight:700}
.phase-badge{background:var(--panel2);color:var(--ink2);border:1px solid var(--line);
  border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500}
.rdots{display:flex;gap:4px}
.rdot{width:26px;height:26px;border-radius:50%;border:2px solid var(--line);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  color:var(--ink3);background:var(--panel2)}
.rdot.cur{border-color:var(--ibs);color:var(--ibs);background:var(--ibs-soft)}
.rdot.done{border-color:var(--good);background:var(--good);color:#fff}

/* ── Timer ── */
.timer-wrap{font-family:'SF Mono',Monaco,monospace;font-size:18px;font-weight:700;
  color:var(--ink);background:var(--panel2);border:1.5px solid var(--line);
  border-radius:8px;padding:5px 14px}
.timer-wrap.exp{color:var(--bad);animation:blink 1s infinite;border-color:var(--bad)}
.timer-wrap.low{color:var(--warn);border-color:var(--warn)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Main ── */
.main{flex:1;padding:16px 24px 40px;display:flex;flex-direction:column;gap:12px}

/* ── Announce ── */
.announce{background:#fffbeb;border:1px solid #fcd34d;border-radius:var(--r);
  padding:12px 18px;display:flex;align-items:center;gap:12px;
  font-size:14px;font-weight:600;color:#92400e;animation:slideIn .4s ease}
@keyframes slideIn{from{transform:translateY(-10px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ── Event banner ── */
.evt{background:#fef2f2;border:1px solid #fca5a5;border-radius:var(--r);padding:12px 16px;display:flex;gap:12px}
.evt.promo{background:#fffbeb;border-color:#fcd34d}
.evt .ico{font-size:24px}
.evt h3{font-size:13px;font-weight:700;color:var(--bad);margin-bottom:3px}
.evt.promo h3{color:#92400e}
.evt p{font-size:12px;color:#7f1d1d;line-height:1.5}
.evt.promo p{color:#78350f}

/* ── Phase full screen ── */
.phase-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.phase-screen .ps-ico{font-size:60px}
.phase-screen .ps-ph{font-size:32px;font-weight:800;color:var(--ibs);letter-spacing:-.4px}
.phase-screen .ps-rd{font-size:15px;color:var(--ink2)}

/* ── Demand grid ── */
.dem-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.dcard{background:var(--panel);border:1.5px solid var(--line);border-radius:var(--r);padding:14px 16px}
.dcard.up{border-color:var(--good);background:#f0fdf4}
.dcard.dn{border-color:var(--bad);background:#fef2f2}
.dcard .cn{font-size:11px;color:var(--ink2);margin-bottom:4px;font-weight:600;
  text-transform:uppercase;letter-spacing:.3px}
.dcard .cv{font-size:32px;font-weight:800;color:var(--ink);
  font-family:'SF Mono',Monaco,monospace}
.dcard .cc{font-size:12px;margin-top:3px;font-weight:600}
.dcard.up .cc{color:var(--good)}.dcard.dn .cc{color:var(--bad)}
.dcard .cc:empty::before{content:'—';color:var(--ink3)}

/* ── Submit grid ── */
.sub-section{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:13px 15px}
.sub-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--ink3);
  font-weight:600;margin-bottom:10px}
.sub-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:8px}
.sub-cell{border-radius:8px;padding:11px 9px;text-align:center;min-height:62px;
  display:flex;flex-direction:column;justify-content:center;
  border:1px solid var(--line);background:var(--panel2);transition:all .3s}
.sub-cell .tn{font-size:12px;color:var(--ink2);margin-bottom:5px;
  line-height:1.25;font-weight:600;word-break:break-word}
.sub-cell .ts{font-size:9px;font-weight:700;border-radius:4px;padding:2px 6px;
  margin-top:3px;display:inline-block}
.sub-cell.wait .ts{background:var(--line2);color:var(--ink3)}
.sub-cell.conn{background:#f0fdf4;border-color:var(--good)}
.sub-cell.conn .ts{background:#dcfce7;color:#166534}
.sub-cell.sub{background:var(--ibs-soft);border-color:var(--ibs)}
.sub-cell.sub .ts{background:var(--ibs-line);color:var(--ibs)}

/* ── Results grid ── */
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.res-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:13px 15px;display:flex;flex-direction:column;gap:7px}
.res-card h4{font-size:12px;font-weight:700;color:var(--ink2);
  border-bottom:1px solid var(--line2);padding-bottom:7px}
.kpi-row{display:flex;justify-content:space-between;align-items:center}
.kpi-lbl{font-size:11px;color:var(--ink2)}
.kpi-val{font-size:14px;font-weight:700;font-family:'SF Mono',Monaco,monospace}
.ok{color:var(--good)}.bad{color:var(--bad)}.wn{color:var(--warn)}.nt{color:var(--ink)}

/* ── Scoreboard ── */
.score-table{width:100%;border-collapse:collapse}
.score-table th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);
  padding:5px 10px;text-align:left;border-bottom:1.5px solid var(--line);font-weight:600}
.score-table td{padding:7px 10px;border-bottom:1px solid var(--line2);font-size:13px}
.score-table tr:last-child td{border-bottom:none}
.score-bar{display:flex;align-items:center;gap:7px}
.sbar{flex:1;height:4px;background:var(--line);border-radius:3px;overflow:hidden}
.sbar-f{height:100%;background:var(--ibs);border-radius:3px;transition:width .8s ease}
.sbar-v{font-size:12px;font-weight:700;color:var(--ibs);min-width:36px;text-align:right;
  font-family:'SF Mono',Monaco,monospace}

/* ── Winner ── */
.winner-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.winner-screen .trophy{font-size:72px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.winner-screen h2{font-size:36px;font-weight:800;color:var(--warn)}
.winner-screen .sub{font-size:15px;color:var(--ink2)}
.winner-cards{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
.winner-card{background:var(--panel);border:2px solid var(--warn);border-radius:12px;
  padding:14px 22px;text-align:center;min-width:160px;box-shadow:var(--sh)}
.winner-card .wtype{font-size:11px;color:var(--ink2);text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.winner-card .wname{font-size:17px;font-weight:800;color:var(--warn)}

/* ── Chain KPI ── */
.chain-kpi{display:flex;gap:10px}
.ck{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:11px 14px;flex:1}
.ck .cl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--ink3);
  margin-bottom:4px;font-weight:600}
.ck .cv{font-size:24px;font-weight:800;font-family:'SF Mono',Monaco,monospace;color:var(--ink)}

/* ── Conn status ── */
.conn-bar{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--bad)}
.conn-dot.ok{background:var(--good)}

/* ── Negotiation map ── */
.nmap{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);
  padding:13px;margin-bottom:12px}
.nmap-row{display:flex;gap:8px;justify-content:center}
.nmap-mid{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 0}
.nmap-link{font-size:11px;color:var(--ink3);font-weight:500}
.nmap-node{flex:1;max-width:140px;text-align:center;background:var(--panel2);
  border-radius:10px;padding:9px 7px;border:1.5px solid var(--line)}
.nmap-node.sup{border-color:var(--sup);background:#f0fdf4}
.nmap-node.ret{border-color:var(--ret);background:var(--ibs-soft)}
.nmap-node.dist{border-color:var(--dist);background:#fffbeb}
.nmap-ico{font-size:20px;line-height:1}
.nmap-nm{font-size:13px;font-weight:700;color:var(--ink);margin-top:3px}
.nmap-team{font-size:10px;color:var(--ink2)}

/* ── Hot deals ── */
.hot-section{margin-bottom:12px}
.hot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.hot-card{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--warn);
  border-radius:9px;padding:10px 12px}
.hot-card.struck{border-left-color:var(--good);background:#f0fdf4}
.hot-pair{font-size:13px;color:var(--ink);font-weight:600}
.hot-arrow{color:var(--ibs);margin:0 3px}
.hot-subj{font-size:11px;color:var(--ink2);margin-top:3px}
.hot-status{font-size:11px;color:var(--warn);margin-top:4px;font-weight:700}
.hot-card.struck .hot-status{color:var(--good)}
.hot-note{font-size:11px;color:var(--ink3);margin-top:8px}
/* Активная пара переговоров — крупно */
.big-pair{display:flex;align-items:stretch;justify-content:center;gap:18px;margin-bottom:22px}
.big-node{flex:0 0 210px;background:var(--panel);border:2px solid var(--line);border-radius:16px;padding:22px;text-align:center}
.big-node.ret{border-color:var(--ret)}.big-node.sup{border-color:var(--sup)}.big-node.dist{border-color:var(--dist)}
.big-node .bn-ico{font-size:50px;line-height:1}
.big-node .bn-lbl{font-size:21px;font-weight:800;color:var(--ink);margin-top:8px}
.big-node .bn-team{font-size:14px;color:var(--ink2);margin-top:2px}
.big-mid{flex:1;max-width:360px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.big-arrow{font-size:42px;color:var(--ibs)}
.big-subj{font-size:16px;color:var(--ink);text-align:center;line-height:1.4}
.big-done{font-size:17px;font-weight:800;color:var(--good)}
.big-wait{font-size:15px;font-weight:700;color:var(--warn)}
.pair-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.pair-chip{display:flex;align-items:center;gap:7px;font-size:13px;padding:8px 13px;border-radius:20px;border:1px solid var(--line);background:var(--panel);color:var(--ink2)}
.pair-chip.on{border-color:var(--ibs);background:var(--ibs-soft);color:var(--ibs);font-weight:700}
.pair-chip.struck{background:#f0fdf4;border-color:var(--good);color:#166534}
.pair-chip .pc-n{display:inline-flex;align-items:center;justify-content:center;width:19px;height:19px;border-radius:50%;background:var(--line);font-size:11px;font-weight:700;color:var(--ink2)}
.pair-chip.on .pc-n{background:var(--ibs);color:#fff}

/* ── Bottom bar ── */
.bbar{background:var(--panel);border-top:1px solid var(--line);padding:7px 24px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:11px;color:var(--ink2);flex-shrink:0}

/* ── Roster (roles) ── */
.roster-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%}
.roster{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:11px 13px}
.roster.ret{border-top:3px solid var(--ret)}
.roster.sup{border-top:3px solid var(--sup)}
.roster.dist{border-top:3px solid var(--dist)}
.roster-hd{display:flex;align-items:center;gap:7px;margin-bottom:8px;padding-bottom:7px;
  border-bottom:1px solid var(--line2)}
.roster-hd .ri{font-size:17px}
.roster-hd .rid{font-size:13px;font-weight:700;color:var(--ink)}
.roster-hd .rnm{font-size:10px;color:var(--ink2)}
.pslot{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-bottom:1px dashed var(--line2)}
.pslot:last-child{border-bottom:none}
.pslot .pri{font-size:13px;width:18px;text-align:center}
.pslot .prole{font-size:11px;font-weight:600;color:var(--ink)}
.pslot .prole.lead{color:var(--warn)}
.pslot .pchar{font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;
  margin-top:2px;display:inline-block}

/* ── Awards ── */
.awards-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.award{border-radius:12px;padding:12px 18px;border:2px solid;background:var(--panel);
  min-width:180px;text-align:center;box-shadow:var(--sh)}
.award .at{font-size:10px;text-transform:uppercase;letter-spacing:.5px;font-weight:700;margin-bottom:4px}
.award .an{font-size:16px;font-weight:800;color:var(--ink)}
.award .as{font-size:11px;color:var(--ink2);margin-top:3px}

/* ── Health banner ── */
.health-banner{background:#f0fdf4;border:1.5px solid var(--good);
  border-radius:var(--r);padding:11px 16px;display:flex;align-items:center;gap:14px}
.health-banner.warn{background:#fffbeb;border-color:var(--warn)}
.health-banner.crit{background:#fef2f2;border-color:var(--bad)}
.health-banner .hv{font-size:28px;font-weight:800;font-family:'SF Mono',Monaco,monospace}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <div class="conn-bar"><div id="l-dot" class="conn-dot"></div><span id="l-status">Подключение…</span></div>
    <div class="ibs-logo"><span>IBS</span></div>
    <h1>FMCG-цепочка</h1>
    <span id="l-phase" class="phase-badge">—</span>
  </div>
  <div class="hdr-c">
    <div class="rdots" id="l-dots"></div>
    <div id="l-rname" style="font-size:13px;font-weight:600;color:var(--ink2)"></div>
  </div>
  <div id="l-timer" class="timer-wrap">⏱ —:——</div>
</header>

<main class="main" id="l-main">
  <div class="phase-screen">
    <div class="ps-ico">🏪</div>
    <div class="ps-ph">FMCG-цепочка</div>
    <div class="ps-rd">Деловая игра · Ожидание начала</div>
  </div>
</main>

<footer class="bbar">
  <span>📺 Проекторный вид · только чтение</span>
  <span id="l-sub">0/9 подали решения</span>
  <span style="color:var(--ink3)">© IBS 2026</span>
</footer>

<script src="/gameconfig.js"></script>
<script src="/live.js"></script>
</body>
</html>
