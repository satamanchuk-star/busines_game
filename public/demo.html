<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<link rel="stylesheet" href="/fonts/onest.css">
<title>Как проходит игра · FMCG-цепочка</title>
<style>
:root{
  --bg:#f3f5f9; --panel:#ffffff; --panel2:#f7f9fc; --line:#e6eaf1; --line2:#eef1f6;
  --ink:#0d1526; --ink2:#56627a; --ink3:#9aa6b8;
  --ibs:#2563eb; --ibs-soft:#eef3ff; --ibs-line:#d7e3ff;
  --ret:#2563eb; --ret-soft:#eef3ff;
  --sup:#15a34a; --sup-soft:#ecfaf0;
  --dist:#d97706; --dist-soft:#fdf5e9;
  --c1:#2563eb; --c2:#15a34a; --c3:#d97706; --c4:#db2777;
  --good:#15a34a; --warn:#d97706; --bad:#dc2626;
  --sh:0 1px 2px rgba(13,21,38,.04), 0 2px 10px rgba(13,21,38,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Onest',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;user-select:none;-webkit-font-smoothing:antialiased;font-size:15px}

/* ── Header ── */
.hdr{height:60px;display:flex;align-items:center;gap:13px;padding:0 18px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;z-index:5}
.ibs{background:var(--ibs);color:#fff;font-weight:800;font-size:14px;padding:5px 11px;border-radius:7px;flex-shrink:0}
.h-sep{width:1px;height:24px;background:var(--line);flex-shrink:0}
.h-step{background:var(--ibs-soft);color:var(--ibs);border-radius:7px;padding:5px 12px;font-size:12.5px;font-weight:700;flex-shrink:0;white-space:nowrap}
.h-title{font-size:17px;font-weight:800;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;letter-spacing:-.01em}
.h-timer{display:flex;flex-direction:column;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:5px 16px;flex-shrink:0}
.h-timer .k{font-size:9px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em}
.h-timer .v{font-size:13.5px;font-weight:800;color:var(--ink2)}
.h-nav{display:flex;gap:6px;flex-shrink:0}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--ink2);border-radius:9px;padding:8px 14px;cursor:pointer;font-size:13px;font-weight:700;font-family:inherit;transition:.15s}
.btn:hover{background:#eef1f6;color:var(--ink)}
.btn.pp{background:var(--ibs);border-color:var(--ibs);color:#fff}
.btn.pp:hover{background:#1d4ed8}
.h-back{color:var(--ink3);font-size:12px;text-decoration:none;flex-shrink:0;transition:.15s}
.h-back:hover{color:var(--ink)}

/* ── Layout ── */
.layout{flex:1;display:flex;min-height:0;overflow:hidden}

/* ── Sidebar ── */
.sb{width:240px;flex-shrink:0;border-right:1px solid var(--line);overflow-y:auto;background:var(--panel);padding:14px 11px;display:flex;flex-direction:column}
.sb-h{font-size:10px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.11em;padding:5px 8px 7px;margin-top:9px}
.sb-h:first-child{margin-top:0}
.sb-t{display:flex;align-items:center;gap:9px;padding:8px;border-radius:9px;margin-bottom:2px;border:1px solid transparent;transition:.2s}
.sb-t.on{background:var(--panel2);border-color:var(--line)}
.sb-t.dim{opacity:.38}
.sb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sb-ic{font-size:15px;width:19px;text-align:center;flex-shrink:0}
.sb-n{font-size:13.5px;font-weight:600;color:var(--ink);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.sb-tag{font-size:10.5px;font-weight:800;color:var(--ink3);flex-shrink:0}
.sb-fl{font-size:12px;font-weight:800;flex-shrink:0}
.sb-sp{flex:1;min-height:10px}
.sb-card{margin-top:12px;padding:12px 13px;background:var(--panel2);border:1px solid var(--line);border-radius:12px}
.sb-card .k{font-size:11px;color:var(--ink2);margin-bottom:5px;font-weight:600}
.sb-card .v{font-size:23px;font-weight:800}
.sb-card .v small{font-size:13px;font-weight:600;color:var(--ink3)}
.sb-prog{margin-top:9px;height:5px;background:var(--line);border-radius:3px;overflow:hidden}
.sb-prog>div{height:100%;background:var(--sup);border-radius:3px;transition:width .5s}
.sb-hint{margin-top:10px;padding:12px 13px;background:var(--ibs-soft);border:1px solid var(--ibs-line);border-radius:12px}
.sb-hint .k{font-size:10px;font-weight:800;color:var(--ibs);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.sb-hint .t{font-size:12px;color:var(--ink2);line-height:1.55}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;min-height:0;min-width:0}
.stage{flex:1;min-height:0;overflow:hidden;padding:18px 22px;display:flex}
.ph{flex:1;min-height:0;display:flex;flex-direction:column;animation:fadeUp .35s ease both}
.ph-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:16px;flex-shrink:0}
.ph-h1{font-size:25px;font-weight:800;letter-spacing:-.02em;line-height:1.15}
.ph-sub{font-size:14px;color:var(--ink2);margin-top:4px}
.ph-tag{flex-shrink:0;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 18px;box-shadow:var(--sh)}
.ph-tag .k{font-size:10px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.ph-tag .v{font-size:25px;font-weight:900;margin-top:1px}
.ph-body{flex:1;min-height:0;display:flex;flex-direction:column}

.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh)}
.card-pad{padding:22px 24px}
.card-lbl{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:15px}

/* ── START hero ── */
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh);position:relative;overflow:hidden}
.hero::before{content:"";position:absolute;inset:0;background:radial-gradient(900px 380px at 50% -10%, var(--ibs-soft), transparent 70%)}
.hero>*{position:relative}
.hero .pill{background:var(--ibs);color:#fff;font-weight:800;font-size:15px;padding:7px 16px;border-radius:9px;margin-bottom:24px}
.hero h1{font-size:48px;font-weight:900;letter-spacing:-.03em;line-height:1.04}
.hero .lead{font-size:18px;color:var(--ink2);margin-top:16px;margin-bottom:34px}
.code{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:22px 46px}
.code .k{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.13em;margin-bottom:9px}
.code .c{font-size:38px;font-weight:900;color:var(--ibs);letter-spacing:.16em}
.code .s{font-size:13px;color:var(--ink3);margin-top:7px}

/* ── ROLES ── */
.roles{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:minmax(150px,1fr);gap:13px;overflow-y:auto;padding-right:4px}
.tc{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--cc);border-radius:15px;box-shadow:var(--sh);padding:15px 17px;display:flex;flex-direction:column;animation:rowIn .4s ease both}
.tc-top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.tc-ic{font-size:25px}
.tc-nm{font-size:15.5px;font-weight:800}
.tc-ty{font-size:12px;font-weight:700;color:var(--cc);margin-top:1px}
.tc-ch{display:inline-flex;align-self:flex-start;align-items:center;gap:7px;background:var(--chs);border:1px solid var(--chl);border-radius:9px;padding:5px 11px;margin-bottom:11px}
.tc-ch .i{font-size:14px}
.tc-ch .n{font-size:12px;font-weight:800;color:var(--chc)}
.tc-rl{display:flex;flex-direction:column;gap:5px;margin-top:auto}
.tc-r{font-size:12px;color:var(--ink2);display:flex;gap:8px;align-items:center}
.tc-r .e{width:16px;text-align:center}

/* ── BRIEFING ── */
.g2{flex:1;min-height:0;display:grid;grid-template-columns:1.25fr 1fr;gap:16px}
.g2>*{min-height:0}
.dem{display:flex;flex-direction:column;justify-content:space-between;height:100%}
.dem-row{flex:1;display:flex;flex-direction:column;justify-content:center}
.dem-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.dem-cat{font-size:16px;font-weight:700}
.dem-val{font-size:26px;font-weight:900}
.dem-bar{height:14px;background:var(--line2);border-radius:7px;overflow:hidden}
.dem-bar>div{height:100%;border-radius:7px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.rcol{display:flex;flex-direction:column;gap:14px;min-height:0}
.ev{border-left:4px solid var(--ev);flex-shrink:0}
.ev .l{font-size:11px;font-weight:800;color:var(--ev);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.ev .t{font-size:18px;font-weight:800;margin-bottom:8px}
.ev .d{font-size:14px;color:var(--ink2);line-height:1.55}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex-shrink:0}
.stat .k{font-size:11px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;font-weight:700}
.stat .v{font-size:26px;font-weight:900}
.stat .s{font-size:12.5px;color:var(--ink3)}
.trend{background:var(--sup-soft);border:1px solid #c9eed5;border-radius:12px;padding:14px 16px;font-size:14px;color:#117a37;font-weight:700;margin-top:auto;flex-shrink:0}

/* ── PAIR negotiations ── */
.pair{flex:1;min-height:0;display:flex;flex-direction:column;gap:14px}
.duel{flex:1;min-height:0;display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:stretch}
.party{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);border-top:4px solid var(--pc);padding:20px 22px;display:flex;flex-direction:column}
.party-top{display:flex;align-items:center;gap:13px;margin-bottom:14px}
.party-top .e{font-size:34px}
.party-top .nm{font-size:19px;font-weight:800}
.party-top .ty{font-size:12.5px;font-weight:700;color:var(--pc)}
.party-ch{display:inline-flex;align-self:flex-start;align-items:center;gap:8px;background:var(--chs);border:1px solid var(--chl);border-radius:10px;padding:7px 13px;margin-bottom:14px}
.party-ch .i{font-size:17px}
.party-ch .n{font-size:13px;font-weight:800;color:var(--chc)}
.bubble{margin-top:auto;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--chc);border-radius:12px;padding:15px 17px;font-size:15px;color:var(--ink);font-style:italic;line-height:1.5}
.duel-mid{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.duel-mid .arr{font-size:30px;color:var(--ink3)}
.duel-mid .badge{font-size:14px;font-weight:800;padding:8px 16px;border-radius:10px;white-space:nowrap;text-align:center}
.duel-mid .cap{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;font-weight:700}
.deals-strip{flex-shrink:0;background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:var(--sh);padding:13px 16px}
.deals-strip .l{font-size:10.5px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.deals-row{display:flex;gap:9px;flex-wrap:wrap}
.deal-chip{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:13px}
.deal-chip b{font-weight:700}
.deal-chip .bg{font-size:11.5px;font-weight:800;padding:2px 9px;border-radius:6px}

/* ── GROUP ── */
.flow{flex:1;min-height:0;display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:14px;align-items:center}
.fcol{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);padding:18px;height:100%;display:flex;flex-direction:column}
.fcol .h{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:13px}
.fitem{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:10px;margin-bottom:8px;font-size:14px;font-weight:600;flex:1}
.fitem:last-child{margin-bottom:0}
.farr{font-size:30px;color:var(--ink3);text-align:center}
.fhub{background:var(--panel);border:2px solid var(--dist);border-radius:18px;box-shadow:var(--sh);padding:24px;text-align:center}
.fhub .e{font-size:44px}
.fhub .n{font-size:17px;font-weight:800;color:var(--dist);margin-top:8px}
.fhub .s{font-size:12.5px;color:var(--ink3);margin-top:4px}

/* ── DECISIONS ── */
.dec{flex:1;min-height:0;display:grid;grid-template-columns:.85fr 1.15fr;gap:16px}
.dec>*{min-height:0;display:flex;flex-direction:column}
.stgrid{flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:1fr;gap:9px}
.stc{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--line);border-radius:12px;background:var(--panel)}
.stc.ok{background:var(--sup-soft);border-color:#c9eed5}
.stc.wt{background:var(--dist-soft);border-color:#f1dcbb}
.stc .e{font-size:19px}
.stc .info{flex:1;min-width:0}
.stc .nm{font-size:13.5px;font-weight:700}
.stc .ty{font-size:11px;font-weight:600;margin-top:1px}
.stc .fl{font-size:17px;font-weight:900}
.form{flex:1;min-height:0;display:flex;flex-direction:column;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);overflow:hidden}
.form-h{background:var(--ibs);color:#fff;padding:13px 18px;font-size:15px;font-weight:800;display:flex;align-items:center;gap:9px;flex-shrink:0}
.ftbl{width:100%;border-collapse:collapse;flex:1}
.ftbl th{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em;text-align:center;padding:12px 8px;border-bottom:1px solid var(--line)}
.ftbl th:first-child{text-align:left;padding-left:20px}
.ftbl td{padding:11px 8px;border-bottom:1px solid var(--line2);text-align:center}
.ftbl td:first-child{text-align:left;padding-left:20px}
.fcat{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:700}
.fdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.ffore{font-size:15px;font-weight:700;color:var(--ink3)}
.finp{width:68px;background:#fff;border:1.5px solid #ccd6e4;border-radius:9px;color:var(--ink);font-size:15px;font-weight:800;font-family:inherit;padding:8px 6px;text-align:center}
.finp.pr{border-color:#e6c7d6}
.fchk{width:18px;height:18px;accent-color:var(--ibs)}
.form-f{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;gap:12px;flex-shrink:0;border-top:1px solid var(--line)}
.form-f .h{font-size:12.5px;color:var(--ink3)}
.bsub{background:var(--ibs);color:#fff;border:none;border-radius:10px;padding:11px 22px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;white-space:nowrap}
.decnote{margin-top:11px;display:flex;gap:10px;align-items:flex-start;background:var(--dist-soft);border:1px solid #f1dcbb;border-radius:12px;padding:13px 15px;flex-shrink:0}
.decnote .i{font-size:17px}
.decnote .t{font-size:13px;color:#8c6116;line-height:1.5;font-weight:600}

/* ── RESULTS ── */
.res{flex:1;min-height:0;display:grid;grid-template-columns:1.7fr 1fr;gap:16px}
.res>*{min-height:0}
.lb{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.lbh{display:grid;grid-template-columns:30px 1fr 78px 64px 70px 78px;padding:11px 18px;border-bottom:1px solid var(--line);flex-shrink:0}
.lbh>div{font-size:10px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.04em}
.lbb{flex:1;min-height:0;display:flex;flex-direction:column}
.lbr{display:grid;grid-template-columns:30px 1fr 78px 64px 70px 78px;align-items:center;padding:0 18px;border-bottom:1px solid var(--line2);border-left:4px solid var(--rc);flex:1;animation:rowIn .4s ease both}
.lbr .rk{font-size:15px;font-weight:800}
.lbt{display:flex;align-items:center;gap:10px;min-width:0}
.lbt .e{font-size:17px}
.lbt .n{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lbt .ty{font-size:11px;font-weight:600}
.lbn{font-size:14px;font-weight:700;text-align:right}
.lbtot{font-size:16px;font-weight:900;text-align:right}
.hcol{display:flex;flex-direction:column;gap:14px;min-height:0}
.hbig{text-align:center}
.hbig .k{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.hbig .v{font-size:52px;font-weight:900;line-height:1}
.hbig .w{font-size:13px;font-weight:700;margin-top:2px}
.hsub{display:flex;flex-direction:column;gap:11px;margin-top:18px}
.hs{display:flex;align-items:center;gap:10px}
.hs .nm{font-size:12.5px;color:var(--ink2);width:78px;font-weight:600}
.hs .bar{flex:1;height:7px;background:var(--line2);border-radius:4px;overflow:hidden}
.hs .bar>div{height:100%;border-radius:4px}
.hs .vv{font-size:12.5px;font-weight:800;width:34px;text-align:right}
.ins{flex:1;display:flex;gap:12px;align-items:flex-start;background:var(--ibs-soft);border:1px solid var(--ibs-line);border-radius:14px;padding:16px 18px}
.ins .i{font-size:20px;flex-shrink:0}
.ins .k{font-size:11px;font-weight:800;color:var(--ibs);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.ins .t{font-size:14px;color:var(--ink2);line-height:1.55}

/* ── FINAL ── */
.fin{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;overflow-y:auto}
.fin .tr{font-size:50px;animation:pop .6s ease both}
.fin h1{font-size:36px;font-weight:900;letter-spacing:-.02em;margin-top:6px}
.fin .lead{font-size:15px;color:var(--ink2);margin-top:6px;margin-bottom:24px}
.awards{display:flex;gap:13px;margin-bottom:24px;flex-wrap:wrap;justify-content:center}
.aw{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);padding:18px 16px;width:178px;animation:pop .5s ease both}
.aw .e{font-size:32px;margin-bottom:9px}
.aw .t{font-size:12.5px;font-weight:800;margin-bottom:3px}
.aw .s{font-size:10.5px;color:var(--ink3);margin-bottom:12px;min-height:24px}
.aw .win{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 11px}
.aw .win .we{font-size:17px}
.aw .win .wn{font-size:13.5px;font-weight:800;margin-top:2px}
.aw .win .ws{font-size:11.5px;color:var(--ink2);margin-top:1px}
.finlb{width:100%;max-width:600px}
.finlb .lbr{padding:0 18px;min-height:42px}

/* ── Description ── */
.desc{flex-shrink:0;padding:12px 22px 13px;background:var(--panel);border-top:1px solid var(--line);display:flex;align-items:flex-start;gap:11px;min-height:52px}
.desc .i{font-size:17px;flex-shrink:0;margin-top:1px}
.desc .t{font-size:13px;color:var(--ink2);line-height:1.6}

/* ── Bottom ── */
.bottom{flex-shrink:0;padding:9px 22px 11px;border-top:1px solid var(--line);background:var(--panel)}
.tlbar{position:relative;height:3px;background:var(--line);border-radius:2px;margin-bottom:10px}
.tlfill{position:absolute;left:0;top:0;height:100%;background:var(--ibs);border-radius:2px;transition:width .08s linear}
.ctrl{display:flex;align-items:center;gap:9px}
.ctrl .lbl{font-size:12px;color:var(--ink3);font-weight:700;white-space:nowrap}
.ctrl .sep{width:1px;height:18px;background:var(--line)}
.dots{display:flex;gap:4px;align-items:center;margin-left:auto;flex-wrap:nowrap}
.dot{width:9px;height:9px;border-radius:50%;background:#cfd8e6;cursor:pointer;transition:.2s;flex-shrink:0}
.dot:hover{background:#9fb0c4;transform:scale(1.3)}
.dot.done{background:#8eb0f3}
.dot.cur{width:12px;height:12px;background:var(--ibs);box-shadow:0 0 0 3px var(--ibs-soft)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes rowIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes pop{0%{opacity:0;transform:scale(.5)}65%{transform:scale(1.07)}100%{opacity:1;transform:scale(1)}}

/* ── COUNCIL (Совет команды) ── */
.council{flex:1;min-height:0;display:grid;grid-template-columns:repeat(4,1fr);gap:13px}
.rc{background:var(--panel);border:1px solid var(--line);border-top:4px solid var(--rcc);border-radius:15px;box-shadow:var(--sh);padding:16px 16px;display:flex;flex-direction:column;animation:rowIn .4s ease both}
.rc-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rc-ic{font-size:24px}
.rc-nm{font-size:14px;font-weight:800;line-height:1.1}
.rc-du{font-size:11px;font-weight:700;color:var(--rcc);margin-top:2px}
.rc-say{flex:1;margin-top:8px;background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--rcc);border-radius:11px;padding:12px 13px;font-size:13px;color:var(--ink);line-height:1.5;font-style:italic}
.rc-out{margin-top:9px;display:flex;align-items:center;gap:7px;font-size:12px;font-weight:700;color:var(--ink2)}
.rc-out .e{font-size:14px}

/* ── TEACH (обучающие сцены) ── */
.teach{flex:1;min-height:0;display:grid;grid-template-columns:1.05fr .95fr;gap:16px}
.teach.one{grid-template-columns:1fr}
.teach>*{min-height:0}
.tcard2{background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh);padding:22px 24px;display:flex;flex-direction:column;overflow-y:auto}
.tcard2 .tk{font-size:11px;font-weight:800;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px}
.tlist{display:flex;flex-direction:column;gap:12px}
.tli{display:flex;gap:13px;align-items:flex-start}
.tli>div{min-width:0}
.tli .e{font-size:22px;flex-shrink:0;width:30px;text-align:center}
.tli .tt{font-size:14px;font-weight:800;margin-bottom:2px}
.tli .td{font-size:13px;color:var(--ink2);line-height:1.5}
.tformula{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:16px 18px;font-size:15px;line-height:1.9;color:var(--ink)}
.tformula .hl{font-weight:800;padding:2px 8px;border-radius:6px}
.tnote{margin-top:auto;display:flex;gap:11px;align-items:flex-start;background:var(--ibs-soft);border:1px solid var(--ibs-line);border-radius:13px;padding:14px 16px}
.tnote .i{font-size:19px;flex-shrink:0}
.tnote .t{font-size:13px;color:var(--ink2);line-height:1.55}
.tnote .t b{color:var(--ink)}
.tbars{display:flex;flex-direction:column;gap:13px;margin-top:4px}
.tbar .tbh{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
.tbar .tbh .w{font-weight:800}
.tbar .tt2{height:11px;background:var(--line2);border-radius:6px;overflow:hidden}
.tbar .tt2>div{height:100%;border-radius:6px}
@media(max-width:1000px){.teach{grid-template-columns:1fr}.council{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="hdr">
  <div class="ibs">IBS</div>
  <div class="h-sep"></div>
  <div class="h-step" id="i-step">— Старт —</div>
  <div class="h-title" id="i-title">FMCG-цепочка поставок</div>
  <div class="h-timer"><div class="k">Время</div><div class="v" id="i-time">Минута 0</div></div>
  <div class="h-nav">
    <button class="btn" onclick="prev()">◄</button>
    <button class="btn pp" id="btn-pp" onclick="togglePlay()">▶ Играть</button>
    <button class="btn" onclick="next()">Далее ►</button>
  </div>
  <a href="/" class="h-back">← Главная</a>
</div>

<div class="layout">
  <div class="sb" id="sb"></div>
  <div class="main">
    <div class="stage" id="stage"></div>
    <div class="desc"><span class="i">💡</span><div class="t" id="i-desc"></div></div>
  </div>
</div>

<div class="bottom">
  <div class="tlbar"><div class="tlfill" id="tlfill" style="width:0%"></div></div>
  <div class="ctrl">
    <span class="lbl" id="ctrl-lbl">1 из 23</span>
    <div class="sep"></div>
    <div class="dots" id="dots"></div>
  </div>
</div>

<script src="/demo.js"></script>
</body>
</html>
