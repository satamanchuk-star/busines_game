<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Как проходит игра · FMCG-цепочка</title>
<style>
@font-face{font-family:'CG';src:url('/fonts/CenturyGothic.ttf') format('truetype');font-weight:400}
@font-face{font-family:'CG';src:url('/fonts/CenturyGothic-Bold.ttf') format('truetype');font-weight:700}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'CG',system-ui,sans-serif;background:#070e1c;color:#fff;display:flex;flex-direction:column;height:100vh;user-select:none}

/* ── Header ── */
.hdr{display:flex;align-items:center;gap:14px;padding:9px 20px;background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0}
.ibs-mark{width:28px;height:28px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:'Arial Black',sans-serif;font-size:10px;font-weight:900;color:#0d1929;flex-shrink:0}
.hdr-title{font-size:13px;font-weight:700;color:rgba(255,255,255,.75);flex:1}
.hdr-back{color:rgba(255,255,255,.35);font-size:12px;text-decoration:none;transition:color .15s}
.hdr-back:hover{color:#fff}

/* ── Info panel ── */
.info{display:flex;align-items:flex-start;gap:16px;padding:10px 22px 9px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.06);min-height:68px}
.info-left{flex:1;min-width:0}
.info-step{font-size:10px;text-transform:uppercase;letter-spacing:1.4px;color:#3b82f6;font-weight:700;margin-bottom:3px;transition:opacity .2s}
.info-title{font-size:19px;font-weight:700;line-height:1.2}
.info-desc{font-size:12px;color:rgba(255,255,255,.52);margin-top:5px;line-height:1.55;max-width:640px}
.info-badge{flex-shrink:0;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);border-radius:20px;padding:5px 16px;font-size:11px;color:rgba(255,255,255,.55);font-weight:600;margin-top:2px;white-space:nowrap}

/* ── Scene area ── */
.scene{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:6px 16px 4px}
#svg-room{width:100%;height:100%;max-width:840px;max-height:395px;overflow:visible}

/* ── Bottom controls ── */
.bottom{flex-shrink:0;padding:8px 20px 10px;border-top:1px solid rgba(255,255,255,.07)}
.tl-bar{position:relative;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-bottom:9px}
.tl-fill{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,#1d4ed8,#3b82f6);border-radius:2px;transition:width .08s linear}
.ctrl{display:flex;align-items:center;gap:8px}
.btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.8);border-radius:8px;padding:7px 18px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit;transition:all .15s;letter-spacing:.2px}
.btn:hover{background:rgba(255,255,255,.13);color:#fff}
.btn-pp{background:#1e3461;border-color:#3b82f6;color:#93c5fd}
.btn-pp:hover{background:#2563eb;color:#fff}
.tl-dots{display:flex;gap:6px;align-items:center;margin-left:auto}
.tdot{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:rgba(255,255,255,.3);cursor:pointer;transition:all .2s;flex-shrink:0}
.tdot:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.6)}
.tdot.done{border-color:#1e40af;color:#60a5fa;background:rgba(30,58,138,.3)}
.tdot.cur{border-color:#3b82f6;color:#fff;background:#1e3461;box-shadow:0 0 10px rgba(59,130,246,.4)}
.ctrl-sep{width:1px;height:20px;background:rgba(255,255,255,.1)}

/* ── CSS Animations ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes popIn{0%{opacity:0;transform:scale(.4)}65%{transform:scale(1.1)}100%{opacity:1;transform:scale(1)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes dash{to{stroke-dashoffset:-20}}
@keyframes dash2{to{stroke-dashoffset:-16}}
@keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 4px rgba(59,130,246,.4))}50%{filter:drop-shadow(0 0 14px rgba(59,130,246,.9))}}
@keyframes screenBright{0%{opacity:.6}50%{opacity:1}100%{opacity:.8}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes bubblePop{0%{opacity:0;transform:scale(.3) translateY(8px)}60%{transform:scale(1.08) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes trophyBounce{0%,100%{transform:translateY(0) scale(1)}40%{transform:translateY(-8px) scale(1.15)}}
@keyframes checkPop{0%{opacity:0;transform:scale(.2)}60%{transform:scale(1.3)}100%{opacity:1;transform:scale(1)}}
@keyframes typeText{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(30px) rotate(180deg);opacity:0}}
</style>
</head>

    <button class="btn btn-pp" id="btn-pp" onclick="togglePlay()">⏸ Пауза</button>
    <button class="btn" onclick="prev()">← Назад</button>
    <button class="btn" onclick="next()">Вперёд →</button>
    <div class="ctrl-sep"></div>
    <span style="font-size:11px;color:rgba(255,255,255,.3)" id="ctrl-lbl">Шаг 1 из 8</span>
    <div class="tl-dots" id="tl-dots"></div>
  </div>
</div>

<script>
const SCENES = [
  {
    step:'— Старт —', title:'Ведущий открывает игру', time:'Мин 0',
    desc:'До 32 участников занимают места за столами 9 команд (4 ритейлера, 4 поставщика, 1 дистрибьютор). Ведущий выходит к проектору и объясняет задачу.',
    dur:5500, fn: () => {
      animTbls();
      setBubble('Добро пожаловать!','Начинаем игру!', true);
    }
  },
  {
    step:'Шаг 1 из 7', title:'Команды получают роли', time:'Мин 0–3',
    desc:'Ведущий раздаёт карточки ролей (Директор, Аналитик, Закупщик, Планировщик) и характеров (Жёсткий, Кооперативный, Хитрый…). Команды придумывают себе название.',
    dur:5500, fn: () => {
      show('g-cards');
      animCards();
      setBubble('Берите карточки!','Роль + характер каждому', true);
    }
  },
  {
    step:'Шаг 2 из 7', title:'Брифинг — история рынка', time:'Мин 3–6',
    desc:'Ведущий показывает на проекторе 3 исторических периода спроса по 4 категориям. Аналитик каждой команды изучает тренды и строит прогноз для своей команды.',
    dur:5500, fn: () => {
      showScr('scr-hist');
      show('g-devices');
      setBubble('Изучите историю!','3 периода + тренд', true);
    }
  },
  {
    step:'Шаг 3 из 7', title:'Брифинг — текущий тур', time:'Мин 6–10',
    desc:'Проектор переключается на данные текущего тура: спрос, событие (шок / промо / квота). Аналитик уточняет прогноз, совет команды вырабатывает позицию для переговоров.',
    dur:5500, fn: () => {
      showScr('scr-brief');
      show('g-devices');
      glowTbls('ret');
      setBubble('Тур 1 открыт!','Данные рынка на экране', true);
    }
  },
  {
    step:'Шаг 4 из 7', title:'Переговоры — 12 минут', time:'Мин 10–22',
    desc:'Ритейлеры физически подходят к поставщикам и договариваются о скидках, объёмах и приоритетах. Дистрибьютор договаривается с ритейлерами о тарифе. Все сделки фиксируются в интерфейсе.',
    dur:6500, fn: () => {
      show('g-arrows');
      animArrows();
      setBubble('Переговоры!','12 минут · ходите к поставщикам', true);
    }
  },
  {
    step:'Шаг 5 из 7', title:'Ввод решений — 7 минут', time:'Мин 22–29',
    desc:'Каждая команда вводит финальные цифры в свой интерфейс: ритейлеры — заказы, цены и промо; поставщики — объём выпуска и скидки; дистрибьютор — тариф и мощность.',
    dur:5500, fn: () => {
      showScr('scr-dec');
      show('g-laptops');
      animChecks();
      setBubble('Вводите решения!','7 минут · все данные в форму', true);
    }
  },
  {
    step:'Шаг 6 из 7', title:'Движок рассчитывает тур', time:'Мин 29–31',
    desc:'Ведущий нажимает «Рассчитать». Сервер автоматически считает прибыль, OSA, дефицит, буллвип-эффект и здоровье цепочки для всех 9 команд за секунды.',
    dur:4500, fn: () => {
      show('g-spinner');
      spinIt();
      dimTbls();
      hideBubble();
    }
  },
  {
    step:'Шаг 7 из 7', title:'Итоги и разбор', time:'Мин 31–45',
    desc:'Проектор показывает рейтинг, прибыль, здоровье цепочки и 4 специальных награды. Ведущий разбирает обучающие моменты тура. Затем — следующий тур или финал.',
    dur:6500, fn: () => {
      showScr('scr-res');
      show('g-trophy');
      animTrophy();
      restoreTbls();
      setBubble('Объявляем итоги!','Разбираем цепочку вместе', true);
    }
  },
];

let cur = 0, playing = true, timer = null, fillTimer = null, fillStart = 0;

// ── Helpers ──
const $ = id => document.getElementById(id);
function show(id) { const e = $(id); e.style.opacity='1'; e.style.animation='fadeIn .45s ease forwards'; }
function hide(id) { const e = $(id); e.style.opacity='0'; e.style.animation=''; }

function showScr(id) {
  ['scr-default','scr-brief','scr-hist','scr-dec','scr-res'].forEach(s=>{
    const e=$(s); e.style.opacity = s===id?'1':'0';
    if(s===id) e.style.animation='fadeIn .5s ease forwards';
  });
  // Glow screen when showing data
  if(id!=='scr-default') $('screen-glow').style.animation='screenBright 2s ease-in-out infinite';
}

function setBubble(line1, line2, visible) {
  $('lead-bubble-text').textContent = line1;
  $('lead-bubble-sub').textContent = line2;
  const b = $('lead-bubble');
  if(visible){ b.style.opacity='1'; b.style.animation='bubblePop .4s cubic-bezier(.34,1.56,.64,1) .1s both'; }
  else hideBubble();
}
function hideBubble() {
  const b=$('lead-bubble'); b.style.opacity='0'; b.style.animation='';
}

function animTbls() {
  document.querySelectorAll('.tbl').forEach((g,i)=>{
    g.style.opacity='0';
    g.style.filter='';
    g.style.animation=`fadeInUp .5s ease ${i*.07}s both`;
  });
}
function glowTbls(type) {
  document.querySelectorAll('.tbl').forEach(g=>{
    const isRet = g.id.startsWith('g-R');
    const isSup = g.id.startsWith('g-S');
    if(type==='ret' && isRet) g.style.filter='drop-shadow(0 0 8px rgba(59,130,246,.6))';
    else if(type==='sup' && isSup) g.style.filter='drop-shadow(0 0 8px rgba(34,197,94,.6))';
    else if(type==='all') g.style.filter='drop-shadow(0 0 6px rgba(255,255,255,.2))';
  });
}
function dimTbls() {
  document.querySelectorAll('.tbl').forEach(g=>{ g.style.opacity='.25'; g.style.filter=''; });
}
function restoreTbls() {
  document.querySelectorAll('.tbl').forEach(g=>{ g.style.opacity='1'; g.style.filter=''; });
}

function animCards() {
  document.querySelectorAll('.role-card').forEach((g,i)=>{
    g.style.opacity='0';
    g.style.animation=`popIn .45s cubic-bezier(.34,1.56,.64,1) ${.1+i*.1}s both`;
  });
  // Team name badge
  const nb=$('rc-name-R2');
  nb.style.opacity='0';
  setTimeout(()=>{ nb.style.opacity='1'; nb.style.animation='bubblePop .4s ease both'; }, 1400);
}

function animArrows() {
  const lines = document.querySelectorAll('#g-arrows line');
  lines.forEach((l,i)=>{
    l.style.opacity='0';
    l.style.strokeDashoffset='0';
    setTimeout(()=>{
      l.style.opacity='1';
      l.style.animation=`fadeIn .3s ease both, dash .7s linear ${i*.05}s infinite`;
    }, i*200);
  });
}

function animChecks() {
  document.querySelectorAll('.chk').forEach((g,i)=>{
    g.style.opacity='0';
    setTimeout(()=>{
      g.style.opacity='1';
      g.style.animation=`checkPop .35s cubic-bezier(.34,1.56,.64,1) both`;
    }, i*350);
  });
}

function spinIt() {
  $('spin-g').style.transformOrigin='415px 240px';
  $('spin-g').style.animation='spin 1.1s linear infinite';
}

function animTrophy() {
  $('trophy-ico').style.animation='trophyBounce 1.4s ease-in-out infinite';
  $('trophy-glow').style.animation='screenBright 1.5s ease-in-out infinite';
  document.querySelectorAll('.conf').forEach((c,i)=>{
    c.style.animation=`confetti 2s ease-in ${i*.2}s infinite`;
  });
}

// ── Reset all overlays ──
function resetAll() {
  ['g-cards','g-arrows','g-laptops','g-checks','g-spinner','g-trophy','g-devices','lead-bubble'].forEach(id=>{
    const e=$(id); if(e){ e.style.opacity='0'; e.style.animation=''; }
  });
  // Reset card animations
  document.querySelectorAll('.role-card,.chk').forEach(g=>{ g.style.opacity=''; g.style.animation=''; });
  document.querySelectorAll('#g-arrows line').forEach(l=>{ l.style.opacity=''; l.style.animation=''; });
  $('rc-name-R2').style.opacity='0'; $('rc-name-R2').style.animation='';
  $('spin-g').style.animation='';
  $('trophy-ico').style.animation='';
  $('trophy-glow').style.animation='';
  document.querySelectorAll('.conf').forEach(c=>c.style.animation='');
  $('screen-glow').style.animation='';
  // Default screen
  ['scr-default','scr-brief','scr-hist','scr-dec','scr-res'].forEach(s=>{
    const e=$(s); if(e){ e.style.opacity=s==='scr-default'?'1':'0'; e.style.animation=''; }
  });
  restoreTbls();
}

// ── Navigation ──
function goTo(i) {
  if(i<0||i>=SCENES.length) return;
  cur=i;
  const s=SCENES[cur];
  // Update info panel
  ['i-step','i-title','i-desc','i-time'].forEach(id=>{
    const e=$(id); e.style.animation='none'; e.offsetHeight;
    e.style.animation='fadeIn .3s ease forwards';
  });
  $('i-step').textContent  = s.step;
  $('i-title').textContent = s.title;
  $('i-desc').textContent  = s.desc;
  $('i-time').textContent  = s.time;
  $('ctrl-lbl').textContent = `Шаг ${cur+1} из ${SCENES.length}`;
  // Reset + run scene
  resetAll();
  s.fn();
  updateDots();
  resetFill();
  if(playing){ startFill(s.dur); schedNext(s.dur); }
}

function schedNext(dur) {
  clearTimeout(timer);
  timer = setTimeout(()=>{
    if(!playing) return;
    if(cur<SCENES.length-1) goTo(cur+1);
    else { playing=false; updatePPBtn(); }
  }, dur);
}

// ── Play / Pause ──
function togglePlay() {
  playing=!playing; updatePPBtn();
  if(playing){ startFill(SCENES[cur].dur); schedNext(SCENES[cur].dur); }
  else { clearTimeout(timer); stopFill(); }
}
function updatePPBtn() {
  $('btn-pp').textContent = playing?'⏸ Пауза':'▶ Играть';
}
function prev() { clearTimeout(timer); stopFill(); if(cur>0) goTo(cur-1); }
function next() { clearTimeout(timer); stopFill(); if(cur<SCENES.length-1) goTo(cur+1); }

// ── Progress bar ──
function startFill(dur) {
  clearInterval(fillTimer);
  fillStart = Date.now();
  fillTimer = setInterval(()=>{
    const pct = Math.min(100,(Date.now()-fillStart)/dur*100);
    $('tl-fill').style.width = pct+'%';
    if(pct>=100) clearInterval(fillTimer);
  }, 40);
}
function stopFill() { clearInterval(fillTimer); }
function resetFill() { $('tl-fill').style.width='0%'; }

// ── Timeline dots ──
function buildDots() {
  $('tl-dots').innerHTML = SCENES.map((_,i)=>`<div class="tdot" id="td${i}" onclick="clearTimeout(timer);stopFill();goTo(${i})">${i+1}</div>`).join('');
}
function updateDots() {
  SCENES.forEach((_,i)=>{
    $(`td${i}`).className='tdot'+(i<cur?' done':i===cur?' cur':'');
  });
}

// ── Init ──
buildDots();
goTo(0);

// Keyboard nav
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ') { e.preventDefault(); if(e.key===' ') togglePlay(); else next(); }
  if(e.key==='ArrowLeft')  { e.preventDefault(); prev(); }
});
</script>
</body>
</html>
