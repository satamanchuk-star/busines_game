name: Deploy to ibsgame.ru

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 194.67.127.73
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/fmcg-game
            git pull origin main
            npm install --production
            pm2 restart fmcg-game
            echo "✅ Deployed at $(date)"
